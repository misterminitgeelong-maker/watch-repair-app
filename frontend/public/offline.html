<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#C9A248" />
    <title>Mainspring — Offline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --cafe-bg: #f6f2eb;
        --cafe-text: #201813;
        --cafe-text-mid: #5f4d3e;
        --cafe-border: #e3dace;
        --cafe-gold: #c9a248;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: 'DM Sans', system-ui, sans-serif;
        background: var(--cafe-bg);
        color: var(--cafe-text);
      }
      .card {
        max-width: 28rem;
        width: 100%;
        padding: 2rem;
        background: #fcfaf6;
        border: 1px solid var(--cafe-border);
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(31, 23, 18, 0.06);
        text-align: center;
      }
      h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0 0 0.75rem;
        color: var(--cafe-text);
      }
      p {
        margin: 0;
        font-size: 0.95rem;
        line-height: 1.5;
        color: var(--cafe-text-mid);
      }
      .accent {
        display: inline-block;
        margin-top: 1.25rem;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--cafe-gold);
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You&rsquo;re offline</h1>
      <p>Mainspring can&rsquo;t reach the network right now. Check your connection, then try again. Cached screens may still open when you&rsquo;ve visited them before.</p>
      <p class="accent">Mainspring</p>
    </div>
  </body>
</html>
