version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - app-uploads:/app/uploads
      - app-data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: watchrepair
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: watchrepair
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchrepair"]
      interval: 3s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  app-uploads:
  app-data:
