name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        env:
          DATABASE_URL: "sqlite:///./test.db"
          JWT_SECRET: "ci-secret-not-for-production"
          APP_ENV: test
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

      - name: Validate Alembic migrations (upgrade to head)
        env:
          DATABASE_URL: "sqlite:///./alembic_ci.db"
          JWT_SECRET: "ci-secret-not-for-production"
          APP_ENV: test
        run: |
          cd backend
          python -m alembic upgrade head

      - name: Run backend smoke checks
        env:
          DATABASE_URL: "sqlite:///./smoke_ci.db"
          JWT_SECRET: "ci-secret-not-for-production"
          APP_ENV: test
        run: |
          cd backend
          python scripts/run_smoke_checks.py

      - name: Validate seed files
        run: |
          cd backend
          python scripts/check_seed_sanity.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Test frontend
        run: |
          cd frontend
          npm test

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload frontend dist (for native CI)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  capacitor_android:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Cap sync + debug APK
        run: |
          cd frontend
          npm ci
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

  # A-CI: also build the native Kotlin + Compose client that lives in
  # apps/mainspring-native-android. It is independent from the Capacitor
  # wrapper and was never covered by CI before, so Kotlin/Gradle regressions
  # could land silently.
  native_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-native-${{ hashFiles('apps/mainspring-native-android/**/*.gradle*', 'apps/mainspring-native-android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-native-

      - name: Assemble debug
        run: |
          cd apps/mainspring-native-android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload native debug APK
        uses: actions/upload-artifact@v4
        with:
          name: native-android-debug-apk
          path: apps/mainspring-native-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
