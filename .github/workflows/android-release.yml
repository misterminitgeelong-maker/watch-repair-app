# Manual Play Store–style AAB. Configure repo secrets first (see docs/MOBILE_STORE_RELEASE.md).
name: Android release bundle

on:
  workflow_dispatch:
    inputs:
      vite_api_base_url:
        description: "Optional VITE_API_BASE_URL for this build (e.g. https://mainspring.au)"
        required: false
        default: ""

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret ANDROID_KEYSTORE_BASE64. See docs/MOBILE_STORE_RELEASE.md"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > frontend/android/upload.jks

      - name: Write keystore.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing one of ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD"
            exit 1
          fi
          printf '%s\n' "storeFile=upload.jks" "storePassword=${ANDROID_KEYSTORE_PASSWORD}" "keyAlias=${ANDROID_KEY_ALIAS}" "keyPassword=${ANDROID_KEY_PASSWORD}" > frontend/android/keystore.properties

      - name: Install web deps and build
        env:
          VITE_API_BASE_URL: ${{ github.event.inputs.vite_api_base_url }}
        run: |
          cd frontend
          npm ci
          npm run build:vite
          npx cap sync

      - name: Gradle bundleRelease
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: mainspring-android-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
